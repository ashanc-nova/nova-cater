<div x-data="orderSummaryApp()">
    <main class="max-w-7xl mx-auto px-6 pt-28 pb-16">
        <div x-show="order">
            <!-- Page Header with Status -->
            <div class="mb-10 animate-slide-up">
                <a href="/my-orders" onclick="event.preventDefault(); window.history.pushState({},'','/my-orders'); renderPage()"
                   class="inline-flex items-center gap-1 th-faint text-sm hover:th-muted transition-colors mb-4">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Back to My Orders
                </a>
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div>
                        <h1 class="font-display font-extrabold text-3xl md:text-4xl th-heading" x-text="order.eventName"></h1>
                        <p class="th-faint mt-1 text-sm" x-text="'Order #' + order.id + '  &middot;  Placed ' + formatDate(order.placedDate)"></p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="badge-glass text-green-300 border-green-500/20 py-1.5 px-4" x-text="order.status"></span>
                        <span class="badge-glass text-primary-500 border-primary-500/30 py-1.5 px-4" x-text="order.paymentStatus"></span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <!-- Order Summary -->
                <div class="glass-strong rounded-3xl p-6 animate-slide-up stagger-1">
                    <h3 class="font-display font-bold text-lg th-heading mb-5 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-primary-500/20 flex items-center justify-center">
                            <svg class="w-4 h-4 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                        </div>
                        Order Summary
                    </h3>
                    <div class="space-y-3 mb-5">
                        <template x-for="item in order.cart" :key="item.id">
                            <div class="glass rounded-2xl p-4 flex justify-between items-center">
                                <div>
                                    <h4 class="font-semibold th-heading text-sm" x-text="item.name"></h4>
                                    <p class="text-xs th-ghost mt-0.5" x-text="'Qty: ' + item.quantity"></p>
                                </div>
                                <span class="text-sm font-bold th-heading" x-text="formatCurrency(item.price * item.quantity)"></span>
                            </div>
                        </template>
                    </div>

                    <div class="border-t border-black/5 dark:border-white/5 pt-4 space-y-2">
                        <div class="flex justify-between text-sm">
                            <span class="th-faint">Subtotal</span>
                            <span class="th-heading font-medium" x-text="formatCurrency(order.subtotal)"></span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="th-faint">Tax (10%)</span>
                            <span class="th-heading font-medium" x-text="formatCurrency(order.tax)"></span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="th-faint">Delivery Fee</span>
                            <span class="th-heading font-medium" x-text="formatCurrency(order.deliveryFee)"></span>
                        </div>
                        <div class="border-t border-black/5 dark:border-white/5 pt-3 flex justify-between">
                            <span class="font-bold th-heading">Total</span>
                            <span class="text-xl font-bold gradient-text" x-text="formatCurrency(order.total)"></span>
                        </div>
                    </div>
                </div>

                <!-- Event Details -->
                <div class="glass-strong rounded-3xl p-6 animate-slide-up stagger-2">
                    <h3 class="font-display font-bold text-lg th-heading mb-5 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-primary-500/20 flex items-center justify-center">
                            <svg class="w-4 h-4 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        </div>
                        Event Details
                    </h3>
                    <div class="space-y-4">
                        <div class="glass rounded-2xl p-4">
                            <div class="flex items-center gap-3">
                                <svg class="w-4 h-4 text-primary-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                <div>
                                    <p class="text-xs th-ghost mb-0.5">Date & Time</p>
                                    <p class="text-sm th-heading font-medium" x-text="formatDate(order.eventDate)"></p>
                                </div>
                            </div>
                        </div>
                        <div class="glass rounded-2xl p-4">
                            <div class="flex items-center gap-3">
                                <svg class="w-4 h-4 text-primary-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/></svg>
                                <div>
                                    <p class="text-xs th-ghost mb-0.5">Service Type</p>
                                    <p class="text-sm th-heading font-medium capitalize" x-text="order.serviceType"></p>
                                </div>
                            </div>
                        </div>
                        <div class="glass rounded-2xl p-4">
                            <div class="flex items-center gap-3">
                                <svg class="w-4 h-4 text-primary-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                <div>
                                    <p class="text-xs th-ghost mb-0.5">Address</p>
                                    <p class="text-sm th-heading font-medium" x-text="order.deliveryAddress || 'N/A'"></p>
                                </div>
                            </div>
                        </div>
                        <div class="glass rounded-2xl p-4">
                            <div class="flex items-center gap-3">
                                <svg class="w-4 h-4 text-primary-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                <div>
                                    <p class="text-xs th-ghost mb-0.5">Guests</p>
                                    <p class="text-sm th-heading font-medium" x-text="order.guestCount || 'N/A'"></p>
                                </div>
                            </div>
                        </div>
                        <div x-show="order.specialRequirements" class="glass rounded-2xl p-4">
                            <div class="flex items-start gap-3">
                                <svg class="w-4 h-4 text-primary-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                                <div>
                                    <p class="text-xs th-ghost mb-0.5">Special Requirements</p>
                                    <p class="text-sm th-heading font-medium" x-text="order.specialRequirements"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-wrap gap-3 mb-8 animate-slide-up stagger-3">
                <button @click="modifyOrder" class="btn-ghost text-sm py-2.5 px-5 inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    Modify Order
                </button>
                <button @click="cancelOrder" class="bg-black/5 dark:bg-white/5 border border-red-500/20 text-red-300 font-semibold rounded-2xl text-sm py-2.5 px-5 hover:bg-red-500/10 transition-all duration-300 inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    Cancel Order
                </button>
                <button x-show="order.paymentStatus === 'Unpaid'" @click="payNow" class="btn-primary text-sm py-2.5 px-5 inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                    Pay Now
                </button>
            </div>

            <!-- Restaurant Contact -->
            <div class="glass rounded-3xl p-6 animate-slide-up stagger-4">
                <h3 class="font-display font-bold text-lg th-heading mb-4 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-black/5 dark:bg-white/5 flex items-center justify-center">
                        <svg class="w-4 h-4 th-faint" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    </div>
                    Restaurant Contact
                </h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="flex items-center gap-3">
                        <svg class="w-4 h-4 th-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        <span class="text-sm th-muted">Gourmet Delights Catering</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <svg class="w-4 h-4 th-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                        <span class="text-sm th-muted">(555) 123-4567</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <svg class="w-4 h-4 th-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        <span class="text-sm th-muted">contact@gourmetdelights.com</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <svg class="w-4 h-4 th-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <span class="text-sm th-muted">789 Culinary Lane, Foodville, FD 54321</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
