<div x-data="orderDetailsApp()">
    <main class="max-w-7xl mx-auto px-6 pt-28 pb-16">
        <!-- Page Header -->
        <div class="mb-10 animate-slide-up">
            <div class="inline-flex items-center gap-2 badge-glass text-primary-300 mb-4">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Order Details
            </div>
            <h1 class="font-display font-extrabold text-3xl md:text-4xl th-heading">Finalize Your Order</h1>
            <p class="th-faint mt-2">Fill in your event details and review your order</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Form Section -->
            <div class="w-full lg:w-2/3 animate-slide-up stagger-1">
                <div class="glass-strong rounded-3xl p-8">
                    <h2 class="font-display font-bold text-xl th-heading mb-6 flex items-center gap-3">
                        <div class="w-8 h-8 rounded-xl bg-primary-500/20 flex items-center justify-center">
                            <svg class="w-4 h-4 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        </div>
                        Event Details
                    </h2>

                    <div class="space-y-5">
                        <div>
                            <label class="block th-muted text-sm font-medium mb-2" for="eventName">Event Name</label>
                            <input class="glass-input w-full py-3 px-4 rounded-2xl text-sm"
                                   id="eventName" type="text" placeholder="e.g., Annual Team Dinner"
                                   x-model="eventName">
                        </div>

                        <div>
                            <label class="block th-muted text-sm font-medium mb-2" for="eventDateTime">Event Date & Time</label>
                            <input class="glass-input w-full py-3 px-4 rounded-2xl text-sm"
                                   id="eventDateTime" type="datetime-local"
                                   x-model="eventDateTime">
                        </div>

                        <div>
                            <label class="block th-muted text-sm font-medium mb-3">Service Type</label>
                            <div class="grid grid-cols-3 gap-3">
                                <label class="cursor-pointer">
                                    <input type="radio" name="serviceType" value="dineIn" x-model="serviceType" class="hidden peer">
                                    <div class="glass rounded-2xl p-4 text-center transition-all duration-300 peer-checked:bg-primary-500/20 peer-checked:border-primary-500/40 border border-transparent hover:bg-black/5 dark:hover:bg-white/5">
                                        <svg class="w-6 h-6 mx-auto mb-2 th-faint peer-checked:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                                        <span class="text-xs font-semibold th-muted">Dine In</span>
                                    </div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="serviceType" value="delivery" x-model="serviceType" class="hidden peer">
                                    <div class="glass rounded-2xl p-4 text-center transition-all duration-300 peer-checked:bg-primary-500/20 peer-checked:border-primary-500/40 border border-transparent hover:bg-black/5 dark:hover:bg-white/5">
                                        <svg class="w-6 h-6 mx-auto mb-2 th-faint" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/></svg>
                                        <span class="text-xs font-semibold th-muted">Delivery</span>
                                    </div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="serviceType" value="pickup" x-model="serviceType" class="hidden peer">
                                    <div class="glass rounded-2xl p-4 text-center transition-all duration-300 peer-checked:bg-primary-500/20 peer-checked:border-primary-500/40 border border-transparent hover:bg-black/5 dark:hover:bg-white/5">
                                        <svg class="w-6 h-6 mx-auto mb-2 th-faint" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
                                        <span class="text-xs font-semibold th-muted">Pickup</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div x-show="serviceType === 'delivery'" x-transition>
                            <label class="block th-muted text-sm font-medium mb-2" for="deliveryAddress">Delivery Address</label>
                            <input class="glass-input w-full py-3 px-4 rounded-2xl text-sm"
                                   id="deliveryAddress" type="text" placeholder="Enter delivery address"
                                   x-model="deliveryAddress">
                        </div>

                        <div>
                            <label class="block th-muted text-sm font-medium mb-2" for="guestCount">Number of Guests</label>
                            <input class="glass-input w-full py-3 px-4 rounded-2xl text-sm"
                                   id="guestCount" type="number" placeholder="How many guests?"
                                   x-model="guestCount">
                        </div>

                        <div>
                            <label class="block th-muted text-sm font-medium mb-2" for="specialRequirements">Special Requirements</label>
                            <textarea class="glass-input w-full py-3 px-4 rounded-2xl text-sm resize-none"
                                      id="specialRequirements" rows="3" placeholder="Allergies, dietary needs, setup preferences..."
                                      x-model="specialRequirements"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Order Review Sidebar -->
            <div class="w-full lg:w-1/3 animate-slide-up stagger-2">
                <div class="lg:sticky lg:top-28">
                    <div class="glass-strong rounded-3xl p-6">
                        <h2 class="font-display font-bold text-xl th-heading mb-6 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-xl bg-primary-500/20 flex items-center justify-center">
                                <svg class="w-4 h-4 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                            </div>
                            Review Order
                        </h2>

                        <!-- Cart Items -->
                        <div class="space-y-3 mb-6">
                            <template x-for="(item, index) in cart" :key="index">
                                <div class="flex justify-between items-center py-2">
                                    <div class="min-w-0 flex-1">
                                        <h3 x-text="item.name" class="font-semibold th-heading text-sm truncate"></h3>
                                        <p class="text-xs th-faint">Qty: <span x-text="item.quantity"></span> &middot; Serves <span x-text="item.serves * item.quantity"></span></p>
                                    </div>
                                    <span x-text="formatCurrency(item.price * item.quantity)" class="text-sm font-bold th-heading ml-3"></span>
                                </div>
                            </template>
                        </div>

                        <!-- Totals -->
                        <div class="border-t border-black/5 dark:border-white/5 pt-4 space-y-2 mb-6">
                            <div class="flex justify-between text-sm">
                                <span class="th-faint">Subtotal</span>
                                <span class="th-heading font-medium" x-text="formatCurrency(cartSubtotal)"></span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="th-faint">Tax (10%)</span>
                                <span class="th-heading font-medium" x-text="formatCurrency(tax)"></span>
                            </div>
                            <div class="flex justify-between text-sm" x-show="serviceType === 'delivery'">
                                <span class="th-faint">Delivery Fee</span>
                                <span class="th-heading font-medium" x-text="formatCurrency(deliveryFee)"></span>
                            </div>
                            <div class="border-t border-black/5 dark:border-white/5 pt-3 flex justify-between">
                                <span class="font-bold th-heading">Total</span>
                                <span class="text-xl font-bold gradient-text" x-text="formatCurrency(total)"></span>
                            </div>
                        </div>

                        <!-- Edit Order -->
                        <button @click="editOrder" class="w-full btn-ghost text-sm py-2.5 mb-4 flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                            Edit Order
                        </button>

                        <!-- Payment Options -->
                        <div class="mb-6">
                            <h3 class="text-sm font-semibold th-muted mb-3">Payment Option</h3>
                            <div class="space-y-2">
                                <label class="flex items-center gap-3 glass rounded-xl p-3 cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 transition-all">
                                    <input type="radio" name="payment-option" value="pay-later" x-model="paymentOption" class="text-primary-500">
                                    <div>
                                        <span class="text-sm font-medium th-heading">Pay Later</span>
                                        <p class="text-xs th-ghost">Pay at the restaurant</p>
                                    </div>
                                </label>
                                <label class="flex items-center gap-3 glass rounded-xl p-3 cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 transition-all">
                                    <input type="radio" name="payment-option" value="pay-deposit" x-model="paymentOption" class="text-primary-500">
                                    <div>
                                        <span class="text-sm font-medium th-heading">Pay Deposit</span>
                                        <p class="text-xs th-ghost">Partial payment now</p>
                                    </div>
                                </label>
                                <label class="flex items-center gap-3 glass rounded-xl p-3 cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 transition-all">
                                    <input type="radio" name="payment-option" value="pay-full" x-model="paymentOption" class="text-primary-500">
                                    <div>
                                        <span class="text-sm font-medium th-heading">Pay Full</span>
                                        <p class="text-xs th-ghost">Complete payment now</p>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <!-- Deposit Input -->
                        <div class="mb-6" x-show="paymentOption === 'pay-deposit'" x-transition>
                            <label class="block th-muted text-sm font-medium mb-2">Deposit Amount</label>
                            <input class="glass-input w-full py-3 px-4 rounded-2xl text-sm"
                                   type="number" placeholder="Enter deposit amount"
                                   x-model="depositAmount">
                        </div>

                        <!-- Place Order Button -->
                        <button @click="placeOrder"
                                class="w-full btn-primary text-base py-3.5 flex items-center justify-center gap-2"
                                x-text="paymentOption === 'pay-later' ? 'Confirm Order' : 'Pay & Confirm'">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
