<div x-data="menuApp()">
    <main class="max-w-7xl mx-auto px-6 pt-28 pb-16">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Menu Section -->
            <div class="w-full lg:w-2/3">
                <!-- Category Tabs + Layout Toggle Row -->
                <div class="flex items-center justify-between mb-8 gap-4">
                    <div class="flex gap-2 overflow-x-auto scrollbar-hide flex-1">
                        <template x-for="(category, index) in categories" :key="index">
                            <button
                                @click="activeCategory = index"
                                :class="activeCategory === index
                                    ? 'bg-primary-500 text-white shadow-glow'
                                    : 'glass th-muted hover:th-heading'"
                                class="px-5 py-2.5 rounded-2xl text-sm font-semibold whitespace-nowrap transition-all duration-300"
                                x-text="category">
                            </button>
                        </template>
                    </div>
                    <!-- Layout Toggle -->
                    <div class="flex gap-1 glass rounded-xl p-1 flex-shrink-0">
                        <button @click="menuLayout = 'grid'"
                                :class="menuLayout === 'grid' ? 'bg-primary-500/20 text-primary-400' : 'th-faint hover:th-muted'"
                                class="w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                            </svg>
                        </button>
                        <button @click="menuLayout = 'compact'"
                                :class="menuLayout === 'compact' ? 'bg-primary-500/20 text-primary-400' : 'th-faint hover:th-muted'"
                                class="w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- ======= GRID LAYOUT (2 col) ======= -->
                <div x-show="menuLayout === 'grid'" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <template x-for="(item, index) in menuItems[categories[activeCategory]]" :key="'grid-'+index">
                        <div class="glass rounded-3xl overflow-hidden hover-card group">
                            <div class="relative">
                                <img :src="item.image" :alt="item.name" class="w-full h-44 object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                                <div class="absolute bottom-3 left-3">
                                    <span class="badge-glass th-ghost text-xs backdrop-blur-md">
                                        Serves <span x-text="item.serves"></span>
                                    </span>
                                </div>
                            </div>
                            <div class="p-5">
                                <h3 class="font-display font-bold th-heading group-hover:text-primary-400 transition-colors mb-1.5" x-text="item.name"></h3>
                                <p class="th-faint text-sm leading-relaxed mb-4 line-clamp-2" x-text="item.description"></p>
                                <div class="flex items-center justify-between">
                                    <span class="text-xl font-bold gradient-text">$<span x-text="item.price.toFixed(2)"></span></span>
                                    <div>
                                        <button x-show="!isInCart(item)" @click="addToCart(item)"
                                                class="btn-primary text-xs py-2 px-4 inline-flex items-center gap-1.5">
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                            Add
                                        </button>
                                        <div x-show="isInCart(item)" class="flex items-center gap-1">
                                            <button @click="decreaseQuantity(getCartItemIndex(item))"
                                                    class="w-8 h-8 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 th-heading hover:bg-black/10 dark:hover:bg-white/10 flex items-center justify-center transition-all duration-200 text-sm font-medium">
                                                -
                                            </button>
                                            <span x-text="getCartItemQuantity(item)"
                                                  class="w-8 text-center th-heading font-bold text-sm"></span>
                                            <button @click="increaseQuantity(getCartItemIndex(item))"
                                                    class="w-8 h-8 rounded-xl bg-primary-500/20 border border-primary-500/30 text-primary-300 hover:bg-primary-500/30 flex items-center justify-center transition-all duration-200 text-sm font-medium">
                                                +
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- ======= COMPACT GRID LAYOUT (3 col) ======= -->
                <div x-show="menuLayout === 'compact'" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <template x-for="(item, index) in menuItems[categories[activeCategory]]" :key="'compact-'+index">
                        <div class="glass rounded-2xl overflow-hidden hover-card group">
                            <div class="relative">
                                <img :src="item.image" :alt="item.name" class="w-full h-28 object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                            </div>
                            <div class="p-3">
                                <h3 class="font-display font-bold text-sm th-heading group-hover:text-primary-400 transition-colors mb-1 truncate" x-text="item.name"></h3>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="text-sm font-bold gradient-text">$<span x-text="item.price.toFixed(2)"></span></span>
                                    <div>
                                        <button x-show="!isInCart(item)" @click="addToCart(item)"
                                                class="w-7 h-7 rounded-lg bg-primary-500 text-white flex items-center justify-center hover:bg-primary-600 transition-colors">
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                        </button>
                                        <div x-show="isInCart(item)" class="flex items-center gap-0.5">
                                            <button @click="decreaseQuantity(getCartItemIndex(item))"
                                                    class="w-6 h-6 rounded-md bg-black/5 dark:bg-white/5 th-heading flex items-center justify-center text-xs font-medium transition-all">
                                                -
                                            </button>
                                            <span x-text="getCartItemQuantity(item)"
                                                  class="w-5 text-center th-heading font-bold text-xs"></span>
                                            <button @click="increaseQuantity(getCartItemIndex(item))"
                                                    class="w-6 h-6 rounded-md bg-primary-500/20 text-primary-300 flex items-center justify-center text-xs font-medium transition-all">
                                                +
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Cart Section -->
            <div id="cart-section" class="w-full lg:w-1/3">
                <div class="lg:sticky lg:top-28">
                    <div class="glass-strong rounded-3xl p-6">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-10 h-10 rounded-2xl bg-primary-500/20 flex items-center justify-center">
                                <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                                </svg>
                            </div>
                            <h2 class="font-display font-bold text-xl th-heading">Your Cart</h2>
                        </div>

                        <!-- Empty Cart -->
                        <div x-show="cart.length === 0" class="text-center py-12">
                            <div class="w-16 h-16 rounded-2xl bg-black/5 dark:bg-white/5 flex items-center justify-center mx-auto mb-4">
                                <svg class="w-8 h-8 th-ghost" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                                </svg>
                            </div>
                            <h3 class="text-sm font-semibold th-muted mb-1">Your cart is empty</h3>
                            <p class="text-xs th-ghost">Add some delicious items to get started!</p>
                        </div>

                        <!-- Cart Items -->
                        <div x-show="cart.length > 0" class="space-y-4 mb-6">
                            <template x-for="(item, index) in cart" :key="index">
                                <div class="glass-light rounded-2xl p-4">
                                    <div class="flex justify-between items-start">
                                        <div class="flex-1 min-w-0">
                                            <h3 x-text="item.name" class="font-semibold th-heading text-sm truncate"></h3>
                                            <p class="text-xs th-faint mt-0.5">Serves <span x-text="item.serves * item.quantity"></span></p>
                                            <div class="flex items-center gap-2 mt-2">
                                                <button @click="decreaseQuantity(index)" class="w-6 h-6 rounded-lg bg-black/5 dark:bg-white/5 th-muted hover:bg-black/10 dark:hover:bg-white/10 flex items-center justify-center text-xs transition-all">-</button>
                                                <span x-text="item.quantity" class="th-heading text-xs font-bold w-4 text-center"></span>
                                                <button @click="increaseQuantity(index)" class="w-6 h-6 rounded-lg bg-primary-500/20 text-primary-300 hover:bg-primary-500/30 flex items-center justify-center text-xs transition-all">+</button>
                                            </div>
                                        </div>
                                        <span x-text="'$' + (item.price * item.quantity).toFixed(2)" class="text-sm font-bold th-heading ml-3"></span>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Total & Checkout -->
                        <div x-show="cart.length > 0">
                            <div class="border-t border-black/5 dark:border-white/5 pt-4 mb-5">
                                <div class="flex justify-between items-center">
                                    <span class="th-muted font-medium text-sm">Total</span>
                                    <span class="text-xl font-bold th-heading">$<span x-text="cartTotal.toFixed(2)"></span>
                                        <span class="text-xs font-normal th-ghost ml-1">+ tax</span>
                                    </span>
                                </div>
                            </div>
                            <button @click="proceedToCheckout()"
                                    class="w-full btn-primary text-base py-3.5 flex items-center justify-center gap-2">
                                Proceed to Checkout
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Cart FAB -->
    <div x-show="cart.length > 0" class="fixed bottom-6 right-6 lg:hidden z-50">
        <button @click="scrollToCart()"
                class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-700 text-white shadow-glow-lg flex items-center justify-center relative hover:scale-105 transition-transform duration-200">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-white text-primary-600 rounded-full flex items-center justify-center text-[10px] font-bold" x-text="cart.length"></span>
        </button>
    </div>
</div>
