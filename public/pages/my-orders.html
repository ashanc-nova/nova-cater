<div x-data="myOrdersApp()">
    <main class="max-w-7xl mx-auto px-6 pt-28 pb-16">
        <!-- Page Header -->
        <div class="mb-10 animate-slide-up">
            <div class="inline-flex items-center gap-2 badge-glass text-primary-300 mb-4">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Order History
            </div>
            <h1 class="font-display font-extrabold text-3xl md:text-4xl th-heading">My Orders</h1>
            <p class="th-faint mt-2">Track and manage all your catering orders</p>
        </div>

        <div class="glass-strong rounded-3xl overflow-hidden animate-slide-up stagger-1">
            <div class="p-6 sm:p-8">
                <!-- Upcoming Orders -->
                <div class="mb-10">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-8 h-8 rounded-xl bg-primary-500/20 flex items-center justify-center">
                            <svg class="w-4 h-4 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <h2 class="font-display font-bold text-lg th-heading">Upcoming Orders</h2>
                    </div>

                    <div x-show="upcomingOrders.length === 0" class="glass rounded-2xl p-8 text-center">
                        <div class="w-14 h-14 rounded-2xl bg-black/5 dark:bg-white/5 flex items-center justify-center mx-auto mb-3">
                            <svg class="w-7 h-7 th-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                        </div>
                        <p class="th-faint text-sm">No upcoming orders</p>
                        <a href="/menu" onclick="event.preventDefault(); window.history.pushState({},'','/menu'); renderPage()" class="inline-flex items-center gap-1 text-primary-400 text-sm font-medium mt-2 hover:text-primary-300 transition-colors">
                            Start a new order
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </a>
                    </div>

                    <div class="space-y-3">
                        <template x-for="order in upcomingOrders" :key="order.id">
                            <div class="glass rounded-2xl p-5 hover-card cursor-pointer group" @click="viewOrderDetails(order.id)">
                                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary-500/20 to-primary-500/5 flex items-center justify-center flex-shrink-0">
                                            <svg class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                        </div>
                                        <div>
                                            <h3 class="font-display font-bold th-heading group-hover:text-primary-300 transition-colors" x-text="order.eventName"></h3>
                                            <p class="text-sm th-faint mt-0.5">
                                                <span x-text="formatDate(order.eventDate)"></span>
                                                <span class="mx-2 th-ghost">&middot;</span>
                                                <span class="font-semibold th-muted" x-text="formatCurrency(order.total)"></span>
                                            </p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="badge-glass text-blue-300 border-blue-500/20" x-text="order.status"></span>
                                        <svg class="w-4 h-4 th-ghost group-hover:th-faint transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Past Orders -->
                <div>
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-8 h-8 rounded-xl bg-black/5 dark:bg-white/5 flex items-center justify-center">
                            <svg class="w-4 h-4 th-faint" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        </div>
                        <h2 class="font-display font-bold text-lg th-body">Past Orders</h2>
                    </div>

                    <div x-show="pastOrders.length === 0" class="glass rounded-2xl p-8 text-center">
                        <p class="th-ghost text-sm">No past orders yet</p>
                    </div>

                    <div class="space-y-3">
                        <template x-for="order in pastOrders" :key="order.id">
                            <div class="glass rounded-2xl p-5 hover-card cursor-pointer group opacity-70 hover:opacity-100 transition-opacity" @click="viewOrderDetails(order.id)">
                                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-2xl bg-black/5 dark:bg-white/5 flex items-center justify-center flex-shrink-0">
                                            <svg class="w-5 h-5 th-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"/></svg>
                                        </div>
                                        <div>
                                            <h3 class="font-display font-bold th-body group-hover:th-heading transition-colors" x-text="order.eventName"></h3>
                                            <p class="text-sm th-ghost mt-0.5">
                                                <span x-text="formatDate(order.eventDate)"></span>
                                                <span class="mx-2 th-ghost">&middot;</span>
                                                <span class="font-semibold th-muted" x-text="formatCurrency(order.total)"></span>
                                            </p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="badge-glass text-green-300 border-green-500/20" x-text="order.status"></span>
                                        <svg class="w-4 h-4 th-ghost group-hover:th-ghost transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
