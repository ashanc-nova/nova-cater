<header x-data="{ mobileMenuOpen: false, scrolled: false }"
       @scroll.window="scrolled = (window.pageYOffset > 20)"
       class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
       :class="scrolled ? 'glass-nav py-2' : 'py-4'">
    <nav class="max-w-7xl mx-auto px-6">
        <div class="flex items-center justify-between">
            <!-- Logo -->
            <a href="/" @click.prevent="window.history.pushState({},'','/'); renderPage(); mobileMenuOpen = false"
               class="flex items-center gap-3 group">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center shadow-glow transition-all duration-300 group-hover:shadow-glow-lg group-hover:scale-105">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span class="font-display font-bold text-xl th-heading tracking-tight">SNS</span>
            </a>

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center gap-1">
                <a href="/" @click.prevent="window.history.pushState({},'','/'); renderPage()"
                   class="px-4 py-2 rounded-xl text-sm font-medium th-muted hover:th-heading hover:bg-black/5 dark:hover:bg-white/5 transition-all duration-300">
                    Home
                </a>
                <a href="/menu" @click.prevent="window.history.pushState({},'','/menu'); renderPage()"
                   class="px-4 py-2 rounded-xl text-sm font-medium th-muted hover:th-heading hover:bg-black/5 dark:hover:bg-white/5 transition-all duration-300">
                    Menu
                </a>
                <a href="/my-orders" @click.prevent="window.history.pushState({},'','/my-orders'); renderPage()"
                   class="px-4 py-2 rounded-xl text-sm font-medium th-muted hover:th-heading hover:bg-black/5 dark:hover:bg-white/5 transition-all duration-300">
                    My Orders
                </a>

                <!-- Theme Toggle -->
                <button onclick="Alpine.store('theme').toggle()"
                        class="ml-2 w-9 h-9 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 transition-all duration-300"
                        :title="$store.theme.mode === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
                    <!-- Sun icon (shown in dark mode) -->
                    <svg x-show="$store.theme.mode === 'dark'" class="w-4 h-4 th-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <!-- Moon icon (shown in light mode) -->
                    <svg x-show="$store.theme.mode === 'light'" x-cloak class="w-4 h-4 th-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>

                <a href="/menu" @click.prevent="window.history.pushState({},'','/menu'); renderPage()"
                   class="ml-2 btn-primary text-sm py-2 px-5 inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    New Order
                </a>
            </div>

            <!-- Mobile: Theme Toggle + Menu Button -->
            <div class="md:hidden flex items-center gap-2">
                <button onclick="Alpine.store('theme').toggle()"
                        class="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 transition-all duration-300">
                    <svg x-show="$store.theme.mode === 'dark'" class="w-5 h-5 th-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg x-show="$store.theme.mode === 'light'" x-cloak class="w-5 h-5 th-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="relative w-10 h-10 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 transition-all duration-300">
                    <svg x-show="!mobileMenuOpen" class="w-5 h-5 th-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                    <svg x-show="mobileMenuOpen" x-cloak class="w-5 h-5 th-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div x-show="mobileMenuOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 -translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-4"
             class="md:hidden mt-4 glass rounded-2xl p-4 space-y-1">
            <a href="/" @click.prevent="window.history.pushState({},'','/'); renderPage(); mobileMenuOpen = false"
               class="block py-3 px-4 rounded-xl th-body hover:th-heading hover:bg-black/5 dark:hover:bg-white/5 transition-all duration-300 font-medium">
                Home
            </a>
            <a href="/menu" @click.prevent="window.history.pushState({},'','/menu'); renderPage(); mobileMenuOpen = false"
               class="block py-3 px-4 rounded-xl th-body hover:th-heading hover:bg-black/5 dark:hover:bg-white/5 transition-all duration-300 font-medium">
                Menu
            </a>
            <a href="/my-orders" @click.prevent="window.history.pushState({},'','/my-orders'); renderPage(); mobileMenuOpen = false"
               class="block py-3 px-4 rounded-xl th-body hover:th-heading hover:bg-black/5 dark:hover:bg-white/5 transition-all duration-300 font-medium">
                My Orders
            </a>
            <a href="/menu" @click.prevent="window.history.pushState({},'','/menu'); renderPage(); mobileMenuOpen = false"
               class="block btn-primary text-center text-sm mt-2">
                New Order
            </a>
        </div>
    </nav>
</header>
